<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Culinaria | Menú Digital</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="container">
    <header>
        <h1>Culinaria</h1>
        <p class="subtitle">EXPERIENCIA ARTESANAL</p>
    </header>

    <nav class="nav-sectors">
        <a href="#entradas" class="nav-item">ENTRADAS</a>
        <a href="#comidas" class="nav-item">COMIDAS</a>
        <a href="#sin-alcohol" class="nav-item">SIN ALCOHOL</a>
        <a href="#con-alcohol" class="nav-item">CON ALCOHOL</a>
    </nav>

    <section id="form-admin" style="display:none; margin-top: 20px; padding: 20px; border: 1px dashed var(--gold); border-radius: 12px; background: rgba(197, 160, 89, 0.05);">
        <div class="category-title" style="margin-top:0;">Panel Editor</div>
        <div class="input-mesa">
            <input type="text" id="add-nombre" placeholder="Nombre del plato">
            <input type="number" id="add-precio" placeholder="Precio">
            <select id="add-categoria" style="background:#111; color:white; padding:15px; border:1px solid var(--gold); border-radius:6px; margin-bottom:10px; width:100%;">
                <option value="entradas">Entradas</option>
                <option value="comidas">Comidas</option>
                <option value="sin-alcohol">Sin Alcohol</option>
                <option value="con-alcohol">Con Alcohol</option>
            </select>
            <label style="font-size: 0.8rem; color: var(--gold); margin-bottom: 5px; display: block;">Foto del plato:</label>
            <input type="file" id="add-imagen" accept="image/*">
        </div>
        <button class="btn-finalizar" onclick="guardarNuevoProducto()" style="margin-top:10px;">PUBLICAR PLATO</button>
        <button onclick="cerrarAdmin()" style="background:none; border:none; color:white; width:100%; margin-top:10px; opacity:0.5; cursor:pointer;">Cerrar Editor</button>
    </section>

    <main id="menu-dinamico">
        <section id="entradas">
            <div class="category-title">Entradas</div>
            <div class="lista"></div>
        </section>

        <section id="comidas">
            <div class="category-title">Comidas</div>
            <div class="lista"></div>
        </section>

        <section id="sin-alcohol">
            <div class="category-title">Sin Alcohol</div>
            <div class="lista"></div>
        </section>

        <section id="con-alcohol">
            <div class="category-title">Con Alcohol</div>
            <div class="lista"></div>
        </section>
    </main>

    <section id="carrito" class="cart-container">
        <div class="category-title">Tu Pedido</div>
        <div id="lista-carrito">
            <p style="text-align: center; opacity: 0.5;">El carrito está vacío</p>
        </div>
        
        <div class="cart-total">
            <span>TOTAL:</span>
            <span id="total-precio">$0</span>
        </div>

        <div class="input-mesa">
            <label>N° DE MESA:</label>
            <input type="number" id="input-mesa" placeholder="Ej: 5" pattern="[0-9]*" inputmode="numeric">
        </div>

        <button class="btn-finalizar" onpointerdown="enviarWhatsApp()">FINALIZAR PEDIDO</button>
    </section>

    <footer>
        <p class="signature" onclick="toggleAdmin()" style="cursor:pointer;">Programada por: Carlos Thomas Acosta</p>
    </footer>
</div>

<script src="script.js"></script>
</body>
</html>
