<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Culinaria | Menú Digital</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <header>
        <h1>CULINARIA</h1>
        <button id="btn-admin-toggle" onclick="toggleAdmin()">MODO ADMIN</button>
    </header>

    <section id="form-nuevo-producto" style="display:none; padding: 20px; background: rgba(255,255,255,0.05); border-radius: 15px; margin: 10px;">
        <h2 style="color: #d4af37;">Nuevo Producto</h2>
        <input type="text" id="add-nombre" placeholder="Nombre del plato">
        <input type="number" id="add-precio" placeholder="Precio">
        
        <select id="add-categoria">
            <option value="entradas">Entradas</option>
            <option value="comidas">Comidas</option>
            <option value="sin-alcohol">Sin Alcohol</option>
            <option value="con-alcohol">Con Alcohol</option>
        </select>

        <div style="margin: 10px 0;">
            <label style="display: block; margin-bottom: 5px; font-size: 0.8em; color: #aaa;">Subir imagen (Galería):</label>
            <input type="file" id="add-imagen" accept="image/*" style="color: white;">
        </div>

        <button onclick="guardarNuevoProducto()" style="width:100%; background:#d4af37; color:black; font-weight:bold; padding: 10px; border: none; border-radius: 5px; cursor: pointer;">PUBLICAR EN MENÚ</button>
    </section>

    <nav class="categorias-nav">
        <button onclick="document.getElementById('entradas').scrollIntoView()">ENTRADAS</button>
        <button onclick="document.getElementById('comidas').scrollIntoView()">COMIDAS</button>
        <button onclick="document.getElementById('sin-alcohol').scrollIntoView()">SIN ALCOHOL</button>
        <button onclick="document.getElementById('con-alcohol').scrollIntoView()">CON ALCOHOL</button>
    </nav>

    <main id="menu-container">
        <section id="entradas" class="categoria-section">
            <h2>Entradas</h2>
            <div class="lista"></div>
        </section>
        <section id="comidas" class="categoria-section">
            <h2>Comidas</h2>
            <div class="lista"></div>
        </section>
        <section id="sin-alcohol" class="categoria-section">
            <h2>Sin Alcohol</h2>
            <div class="lista"></div>
        </section>
        <section id="con-alcohol" class="categoria-section">
            <h2>Con Alcohol</h2>
            <div class="lista"></div>
        </section>
    </main>

    <div id="carrito-flotante">
        <h3>Tu Pedido</h3>
        <div id="lista-carrito"></div>
        <hr>
        <div class="total">Total: <span id="total-precio">$0</span></div>
        <input type="text" id="input-mesa" placeholder="N° de Mesa">
        <button class="btn-whatsapp" onclick="enviarWhatsApp()">PEDIR POR WHATSAPP</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
