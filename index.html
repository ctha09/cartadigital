<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Culinaria | Menú Digital</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <header>
        <div class="logo-container">
            <h1>CULINARIA</h1>
            <button id="btn-admin-toggle" onclick="toggleAdmin()">MODO ADMIN</button>
        </div>
    </header>

    <section id="form-nuevo-producto" class="admin-panel" style="display:none;">
        <div class="form-card">
            <h2>Nuevo Producto</h2>
            <input type="text" id="add-nombre" placeholder="Nombre del plato">
            <input type="number" id="add-precio" placeholder="Precio ($)">
            
            <select id="add-categoria">
                <option value="entradas">Entradas</option>
                <option value="comidas">Comidas</option>
                <option value="sin-alcohol">Sin Alcohol</option>
                <option value="con-alcohol">Con Alcohol</option>
            </select>

            <div class="file-input-container">
                <label for="add-imagen">📸 Seleccionar de Galería</label>
                <input type="file" id="add-imagen" accept="image/*">
            </div>

            <button id="btn-publicar" onclick="guardarNuevoProducto()">PUBLICAR EN MENÚ</button>
            <p id="upload-status" style="display:none; color: gold; font-size: 0.8em; margin-top: 10px;">Subiendo... por favor espera.</p>
        </div>
    </section>

    <nav class="categorias-nav">
        <button onclick="document.getElementById('entradas').scrollIntoView({behavior: 'smooth'})">ENTRADAS</button>
        <button onclick="document.getElementById('comidas').scrollIntoView({behavior: 'smooth'})">COMIDAS</button>
        <button onclick="document.getElementById('sin-alcohol').scrollIntoView({behavior: 'smooth'})">BEBIDAS</button>
    </nav>

    <main id="menu-container">
        <section id="entradas" class="categoria-section">
            <h2>Entradas</h2>
            <div class="lista"></div>
        </section>
        <section id="comidas" class="categoria-section">
            <h2>Comidas</h2>
            <div class="lista"></div>
        </section>
        <section id="sin-alcohol" class="categoria-section">
            <h2>Sin Alcohol</h2>
            <div class="lista"></div>
        </section>
        <section id="con-alcohol" class="categoria-section">
            <h2>Con Alcohol</h2>
            <div class="lista"></div>
        </section>
    </main>

    <div id="carrito-flotante">
        <h3>Tu Pedido</h3>
        <div id="lista-carrito"></div>
        <div class="carrito-footer">
            <div class="total">Total: <span id="total-precio">$0</span></div>
            <input type="number" id="input-mesa" placeholder="Mesa N°">
            <button class="btn-whatsapp" onclick="enviarWhatsApp()">PEDIR POR WHATSAPP</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
