<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AIRES ESTORIL | Menú Digital</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600;700;800&family=Inter:wght@800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="welcome-screen">
        <div class="bokeh-bg"></div>
        <div class="welcome-content">
            <div class="logo-aires">
                <span class="letter-a"></span>IRES
            </div>
            <div class="logo-estoril">ESTORIL</div>
            <div class="divider-gold"></div>
            <button class="btn-ver-menu" onclick="entrarAlMenu()">VER MENÚ</button>
            <div class="welcome-subtitle">Experiencia Artesanal</div>
        </div>
    </div>

    <div class="language-selector">
        <select id="select-idioma" onchange="cambiarIdioma(this.value)">
            <option value="es">ES 🇪🇸</option>
            <option value="en">EN 🇬🇧</option>
            <option value="pt">PT 🇧🇷</option>
            <option value="fr">FR 🇫🇷</option>
        </select>
    </div>

    <div class="container">
        <header>
            <div class="logo-aires">
                <span class="letter-a"></span>IRES
            </div>
            <div class="logo-estoril">ESTORIL</div>
            <p class="subtitle">EXPERIENCIA ARTESANAL</p>
            
            <button id="btn-admin-view">MANTENIMIENTO</button>
        </header>

        <div id="form-admin">
            <div class="category-title">Nuevo Producto</div>
            <div class="input-admin-group">
                <input type="text" id="add-nombre" placeholder="Nombre del plato">
                <input type="number" id="add-precio" placeholder="Precio (€)">
                <select id="add-categoria">
                    <option value="entradas">Entradas</option>
                    <option value="platos-de-autor">Platos de Autor</option>
                    <option value="comidas">Comidas</option>
                    <option value="acompañamientos">Acompañamientos</option>
                    <option value="postres">Postres</option>
                    <option value="sin-alcohol">Sin Alcohol</option>
                    <option value="con-alcohol">Con Alcohol</option>
                </select>
                <textarea id="add-descripcion" placeholder="Descripción / Ingredientes (Ej: Carne de buey, rúcula, parmesano...)"></textarea>
                
                <label for="add-imagen" class="btn-file-label" style="display:block; margin-bottom:5px; cursor:pointer; color:var(--gold); font-size:0.75rem; border: 1px dashed var(--gold); padding: 12px; text-align: center; border-radius: 6px;">
                    📸 Seleccionar Foto
                </label>
                <input type="file" id="add-imagen" accept="image/*" style="display:none;">
                
                <button class="btn-finalizar" onclick="guardarNuevoProducto()">SUBIR AL MENÚ</button>
                <button onclick="cerrarAdmin()" style="background:none; border:none; color:gray; width:100%; margin-top:15px; cursor:pointer; font-size: 0.7rem; text-transform: uppercase;">Cerrar Panel</button>
            </div>
        </div>

        <nav class="nav-sectors">
            <a href="#entradas" class="nav-item">ENTRADAS</a>
            <a href="#platos-de-autor" class="nav-item">PLATOS DE AUTOR</a>
            <a href="#comidas" class="nav-item">COMIDAS</a>
            <a href="#acompañamientos" class="nav-item">ACOMPAÑAMIENTOS</a>
            <a href="#postres" class="nav-item">POSTRES</a>
            <a href="#sin-alcohol" class="nav-item">SIN ALCOHOL</a>
            <a href="#con-alcohol" class="nav-item">CON ALCOHOL</a>
        </nav>

        <main id="menu-dinamico">
            </main>

        <div id="carrito" class="cart-container">
            <div class="category-title">Tu Pedido</div>
            <div id="lista-carrito">
                </div>
            
            <div class="cart-total">
                <span>TOTAL:</span>
                <span id="total-precio">€0.00</span>
            </div>

            <div class="input-mesa" style="margin-top:25px;">
                <label style="font-size: 0.65rem; color: var(--gold); margin-bottom: 8px; display: block; letter-spacing: 1px;">N° DE MESA:</label>
                <input type="text" id="input-mesa" placeholder="Ej: 5" style="background: #000; border: 1px solid rgba(197, 160, 89, 0.4); color: white; padding: 12px; width: 100%; border-radius: 6px;">
            </div>

            <button class="btn-finalizar" onclick="enviarWhatsApp()">FINALIZAR PEDIDO</button>
        </div>

        <footer>
            <div class="signature">DESIGNED BY CARLOS THOMAS ACOSTA</div>
        </footer>
    </div>

    <div id="info-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="cerrarModal()">&times;</span>
            <h2 id="modal-titulo">Nombre del Plato</h2>
            <h4 style="color: var(--gold); letter-spacing: 2px; font-size: 0.7rem; margin-bottom: 15px; text-transform: uppercase;">Conoce los ingredientes</h4>
            <p id="modal-desc">Descripción...</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
