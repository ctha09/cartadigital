<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AIRES Estoril | Menú Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@800&family=Playfair+Display:wght@600&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="container">
    <header>
        <div class="brand-container">
            <div class="logo-aires">
                <span class="letter-a"></span>I<span class="letter-r">R</span>ES
            </div>
            <div class="logo-estoril">ESTORIL</div>
            <p class="subtitle">EXPERIENCIA ARTESANAL</p>
            <button id="btn-admin-view" onclick="toggleAdmin()">MANTENIMIENTO</button>
        </div>
    </header>

    <nav class="nav-sectors">
        <a href="#entradas" class="nav-item">ENTRADAS</a>
        <a href="#comidas" class="nav-item">COMIDAS</a>
        <a href="#sin-alcohol" class="nav-item">SIN ALCOHOL</a>
        <a href="#con-alcohol" class="nav-item">CON ALCOHOL</a>
    </nav>

    <section id="form-admin" style="display:none;">
        <button onclick="cerrarAdmin()" class="btn-cerrar-admin">[ Cerrar Panel ]</button>
        <div class="category-title">Nuevo Producto</div>
        <div class="input-mesa">
            <input type="text" id="add-nombre" placeholder="Nombre del plato">
            <input type="number" id="add-precio" placeholder="Precio en € (Ej: 3.50)" step="0.01">
            <select id="add-categoria">
                <option value="entradas">Entradas</option>
                <option value="comidas">Comidas</option>
                <option value="sin-alcohol">Sin Alcohol</option>
                <option value="con-alcohol">Con Alcohol</option>
            </select>
            <label for="add-imagen" class="btn-file-label" style="border: 1px dashed var(--gold); color: var(--gold); padding: 15px; display: block; text-align: center; border-radius: 6px; cursor: pointer; margin-top: 10px;">
                📸 Seleccionar Foto
            </label>
            <input type="file" id="add-imagen" accept="image/*" style="display: none;" onchange="document.getElementById('file-name-info').innerText = this.files[0].name">
            <p id="file-name-info" style="font-size: 0.7rem; text-align: center; margin-top: 5px; opacity: 0.6;">Sin archivo seleccionado</p>
        </div>
        <button class="btn-finalizar" onclick="guardarNuevoProducto()">SUBIR AL MENÚ</button>
    </section>

    <main id="menu-dinamico"></main>

    <section id="carrito" class="cart-container">
        <div class="category-title">Tu Pedido</div>
        <div id="lista-carrito">
            </div>
        <div class="cart-total" style="display: flex; justify-content: space-between; padding: 20px 0; border-top: 1px solid var(--gold); margin-top: 15px; font-weight: 700;">
            <span>TOTAL:</span>
            <span id="total-precio">€0.00</span>
        </div>
        <div class="input-mesa">
            <label style="font-size: 0.8rem; color: var(--gold); letter-spacing: 1px;">N° DE MESA:</label>
            <input type="number" id="input-mesa" placeholder="Ej: 5">
        </div>
        <button class="btn-finalizar" onclick="enviarWhatsApp()">FINALIZAR PEDIDO</button>
    </section>

    <footer>
        <p class="signature">Programada por: Carlos Thomas Acosta</p>
    </footer>
</div>

<script src="script.js"></script>
</body>
</html>
