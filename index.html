<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Culinaria | Menú Digital</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="container">
    <header>
        <h1>Culinaria</h1>
        <p class="subtitle">EXPERIENCIA ARTESANAL</p>
        <button id="btn-admin-view" onclick="toggleAdmin()" style="background:none; border:1px solid var(--gold); color:var(--gold); padding:5px 10px; border-radius:15px; font-size:0.6rem; margin-top:10px; cursor:pointer; font-weight:600;">MANTENIMIENTO</button>
    </header>

    <nav class="nav-sectors">
        <a href="#entradas" class="nav-item">ENTRADAS</a>
        <a href="#comidas" class="nav-item">COMIDAS</a>
        <a href="#sin-alcohol" class="nav-item">SIN ALCOHOL</a>
        <a href="#con-alcohol" class="nav-item">CON ALCOHOL</a>
    </nav>

    <section id="form-admin" style="display:none; margin: 20px 0; padding: 20px; border: 1px solid var(--gold); border-radius: 12px; background: rgba(197, 160, 89, 0.05);">
        <div class="category-title" style="margin-top:0;">Nuevo Producto</div>
        <div class="input-mesa">
            <input type="text" id="add-nombre" placeholder="Nombre del plato">
            <input type="number" id="add-precio" placeholder="Precio">
            <select id="add-categoria">
                <option value="entradas">Entradas</option>
                <option value="comidas">Comidas</option>
                <option value="sin-alcohol">Sin Alcohol</option>
                <option value="con-alcohol">Con Alcohol</option>
            </select>
            
            <label for="add-imagen" style="background: rgba(197, 160, 89, 0.1); border: 1px dashed var(--gold); color: var(--gold); padding: 15px; border-radius: 6px; text-align: center; cursor: pointer; font-size: 0.9rem; margin-bottom: 5px; display: block;">
                📸 Seleccionar de la Galería
            </label>
            <input type="file" id="add-imagen" accept="image/*" style="display: none;" onchange="actualizarNombreArchivo(this)">
            <span id="file-name-display" style="font-size: 0.7rem; color: var(--gold); text-align: center; display: block; margin-bottom: 15px; opacity: 0.6;">Sin archivo seleccionado</span>
        </div>
        <button class="btn-finalizar" onclick="guardarNuevoProducto()">SUBIR AL MENÚ</button>
        <button onclick="cerrarAdmin()" style="background:none; border:none; color:white; width:100%; margin-top:15px; opacity:0.5; cursor:pointer; font-size:0.8rem;">[ Cerrar Panel ]</button>
    </section>

    <main id="menu-dinamico">
        <section id="entradas"><div class="category-title">Entradas</div><div class="lista"></div></section>
        <section id="comidas"><div class="category-title">Comidas</div><div class="lista"></div></section>
        <section id="sin-alcohol"><div class="category-title">Sin Alcohol</div><div class="lista"></div></section>
        <section id="con-alcohol"><div class="category-title">Con Alcohol</div><div class="lista"></div></section>
    </main>

    <section id="carrito" class="cart-container">
        <div class="category-title">Tu Pedido</div>
        <div id="lista-carrito"><p style="text-align: center; opacity: 0.5;">El carrito está vacío</p></div>
        <div class="cart-total"><span>TOTAL:</span><span id="total-precio">$0</span></div>
        <div class="input-mesa">
            <label>N° DE MESA:</label>
            <input type="number" id="input-mesa" placeholder="Ej: 5" inputmode="numeric">
        </div>
        <button class="btn-finalizar" onclick="enviarWhatsApp()">FINALIZAR PEDIDO</button>
    </section>

    <footer>
        <p class="signature">Programada por: Carlos Thomas Acosta</p>
    </footer>
</div>

<script src="script.js"></script>
</body>
</html>
