<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Culinaria | Menú Digital</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="background-overlay"></div>

    <header>
        <h1 class="logo">CULINARIA</h1>
        <button id="btn-admin-toggle" class="btn-admin" onclick="toggleAdmin()">MODO ADMIN</button>
        <nav class="categorias-nav">
            <button onclick="document.getElementById('entradas').scrollIntoView({behavior: 'smooth'})">ENTRADAS</button>
            <button onclick="document.getElementById('comidas').scrollIntoView({behavior: 'smooth'})">COMIDAS</button>
            <button onclick="document.getElementById('bebidas').scrollIntoView({behavior: 'smooth'})">BEBIDAS</button>
        </nav>
    </header>

    <main class="main-layout">
        <section class="menu-container">
            <div id="entradas" class="categoria-section">
                <h2 class="cat-title">Entradas</h2>
                <div class="lista"></div>
            </div>
            <div id="comidas" class="categoria-section">
                <h2 class="cat-title">Comidas</h2>
                <div class="lista"></div>
            </div>
            <div id="bebidas" class="categoria-section">
                <h2 class="cat-title">Bebidas</h2>
                <div class="lista"></div>
            </div>
        </section>

        <aside class="sidebar">
            <div id="form-nuevo-producto" class="glass-card admin-panel" style="display:none;">
                <h3>Nuevo Producto</h3>
                <input type="text" id="add-nombre" placeholder="Nombre del plato">
                <input type="number" id="add-precio" placeholder="Precio ($)">
                <select id="add-categoria">
                    <option value="entradas">Entradas</option>
                    <option value="comidas">Comidas</option>
                    <option value="bebidas">Bebidas</option>
                </select>
                <div class="file-box">
                    <label for="add-imagen">📸 Seleccionar Galería</label>
                    <input type="file" id="add-imagen" accept="image/*">
                </div>
                <button class="btn-pub" id="btn-publicar" onclick="guardarNuevoProducto()">PUBLICAR</button>
            </div>

            <div class="glass-card carrito-container">
                <h3>Tu Pedido</h3>
                <div id="lista-carrito"></div>
                <div class="carrito-footer">
                    <div class="total-row">Total: <span id="total-precio">$0</span></div>
                    <input type="number" id="input-mesa" placeholder="Mesa N°">
                    <button class="btn-whatsapp" onclick="enviarWhatsApp()">PEDIR POR WHATSAPP</button>
                </div>
            </div>
        </aside>
    </main>

    <script src="script.js"></script>
</body>
</html>
